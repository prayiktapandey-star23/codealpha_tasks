<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Detail - ShopEasy</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .product-detail-container {
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .product-detail-img {
            width: 100%;
            border-radius: 12px;
            object-fit: cover;
        }
        .product-detail-info {
            padding: 20px 0;
        }
        .product-detail-info h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            color: #1e293b;
        }
        .product-detail-info .category {
            background: #ccfbf1;
            color: #0d9488;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            display: inline-block;
            margin-bottom: 16px;
        }
        .product-detail-info .price {
            font-size: 2rem;
            font-weight: bold;
            color: #0d9488;
            margin-bottom: 16px;
        }
        .product-detail-info .description {
            color: #64748b;
            line-height: 1.8;
            margin-bottom: 24px;
            font-size: 1rem;
        }
        .stock-info {
            background: #f0fdf4;
            color: #16a34a;
            padding: 8px 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            font-weight: 500;
        }
        .btn-large {
            width: 100%;
            padding: 14px;
            font-size: 1.1rem;
            border-radius: 10px;
            cursor: pointer;
            border: none;
            background: linear-gradient(135deg, #0d9488, #14b8a6);
            color: white;
            font-weight: bold;
            transition: transform 0.2s;
        }
        .btn-large:hover {
            transform: translateY(-2px);
        }
        .back-btn {
            display: inline-block;
            margin: 20px;
            color: #0d9488;
            text-decoration: none;
            font-weight: 500;
        }
        .back-btn:hover {
            text-decoration: underline;
        }
        @media (max-width: 600px) {
            .product-detail-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">🛒 <span>ShopEasy</span></div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="products.html">Products</a>
            <a href="cart.html">Cart <span id="cart-count">0</span></a>
            <a href="login.html" id="login-link">Login</a>
            <a href="#" onclick="logout()" id="logout-link" style="display:none">Logout</a>
        </div>
    </nav>

    <a href="products.html" class="back-btn">← Back to Products</a>

    <div class="product-detail-container" id="product-detail">
        <p style="text-align:center; padding:40px; grid-column:1/-1">Loading...</p>
    </div>

    <script src="app.js"></script>
    <script>
        async function loadProductDetail() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');

            if (!id) {
                window.location.href = 'products.html';
                return;
            }

            try {
                const res = await fetch(`${API}/products/${id}`);
                const product = await res.json();
                renderDetail(product);
            } catch {
                const product = DUMMY_PRODUCTS.find(p => p._id === id);
                if (product) renderDetail(product);
                else document.getElementById('product-detail').innerHTML = '<p>Product not found!</p>';
            }
            updateNavAuth();
        }

        function renderDetail(p) {
            document.title = `${p.name} - ShopEasy`;
            document.getElementById('product-detail').innerHTML = `
                <img src="${p.image}" alt="${p.name}" class="product-detail-img"
                     onerror="this.src='https://via.placeholder.com/400x300?text=Product'"/>
                <div class="product-detail-info">
                    <span class="category">${p.category}</span>
                    <h1>${p.name}</h1>
                    <div class="price">₹${p.price}</div>
                    <p class="description">${p.description}</p>
                    <div class="stock-info">✅ In Stock ${p.stock ? `(${p.stock} available)` : ''}</div>
                    <button class="btn-large" onclick="addToCart('${p._id}', '${p.name}', ${p.price}, '${p.image}')">
                        Add to Cart 🛒
                    </button>
                </div>
            `;
        }

        loadProductDetail();
    </script>
</body>
</html>
